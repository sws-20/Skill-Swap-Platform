<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SkillSwap — Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006064',
            accent: '#FF7F50'
          }
        }
      }
    }
  </script>

  <style>
    * {
      font-family: 'Syne', sans-serif;
    }

    body {
      background: #020617;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0, 96, 100, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 127, 80, 0.08) 0%, transparent 60%);
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 96, 100, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 96, 100, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
    }

    nav {
      position: relative;
      z-index: 50;
    }

    /* Chat container */
    #chatBox {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0, 96, 100, 0.1),
        0 25px 50px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Chat header */
    #chatHeader {
      background: linear-gradient(135deg, rgba(0, 96, 100, 0.2), rgba(0, 96, 100, 0.05));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 20px 24px;
    }

    /* Messages area */
    #messagesList {
      height: 420px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messagesList::-webkit-scrollbar {
      width: 4px;
    }

    #messagesList::-webkit-scrollbar-track {
      background: transparent;
    }

    #messagesList::-webkit-scrollbar-thumb {
      background: rgba(0, 96, 100, 0.4);
      border-radius: 2px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.5;
    }

    .empty-state .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0, 96, 100, 0.2);
      border: 1px solid rgba(0, 96, 100, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* Message bubbles */
    .msg-sent {
      align-self: flex-end;
      max-width: 70%;
      background: linear-gradient(135deg, #006064, #00838f);
      color: white;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 12px rgba(0, 96, 100, 0.3);
      animation: popIn 0.2s ease;
    }

    .msg-received {
      align-self: flex-start;
      max-width: 70%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      padding: 10px 16px;
      border-radius: 18px 18px 18px 4px;
      font-size: 14px;
      line-height: 1.5;
      animation: popIn 0.2s ease;
    }

    .msg-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      opacity: 0.45;
      margin-top: 4px;
    }

    .msg-sent .msg-time {
      text-align: right;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Input area */
    #inputArea {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #messageInput {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #messageInput::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    #messageInput:focus {
      border-color: rgba(0, 96, 100, 0.6);
      box-shadow: 0 0 0 3px rgba(0, 96, 100, 0.1);
    }

    #sendMessageBtn {
      background: linear-gradient(135deg, #006064, #00838f);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(0, 96, 100, 0.3);
    }

    #sendMessageBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 96, 100, 0.4);
    }

    #sendMessageBtn:active {
      transform: translateY(0);
    }

    /* Online indicator */
    .online-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Nav */
    nav {
      backdrop-filter: blur(20px);
      background: rgba(2, 6, 23, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
  </style>
</head>

<body class="text-gray-200 min-h-screen overflow-x-hidden">

  <nav class="sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div id="sidebarAvatarSmall"
          class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-accent flex items-center justify-center font-bold text-white text-lg">
          S
        </div>
        <span class="text-xl font-semibold">SkillSwap</span>
      </div>
      <div class="flex items-center space-x-4">
        <a href="home.html" class="text-sm hover:text-primary transition">Dashboard</a>
        <a href="browse.html" class="text-sm hover:text-primary transition">Browse</a>
        <a href="profile.html" class="text-sm hover:text-primary transition">Profile</a>
        <a href="view-requests.html" class="text-sm hover:text-primary transition">Requests</a>
        <button onclick="logout()"
          class="px-4 py-2 rounded-lg border border-white/20 hover:bg-white/10 transition text-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-8">

    <div id="chatBox">

      <!-- Header -->
      <div id="chatHeader">
        <div id="chatTitle" class="flex items-center gap-3">
          <!-- Populated by chatService.js -->
          <div class="flex items-center gap-2">
            <div
              class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center font-bold text-white text-sm">
              ?</div>
            <div>
              <div class="font-semibold text-white text-base">Loading...</div>
              <div class="text-xs text-gray-400 flex items-center gap-1.5 mt-0.5">
                <span class="online-dot"></span> Active session
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messagesList">
        <!-- Empty state shown until first message loads -->
        <div class="empty-state">
          <div class="icon">💬</div>
          <p class="text-sm text-gray-400">No messages yet — say hello!</p>
        </div>
      </div>

      <!-- Input -->
      <div id="inputArea" class="flex flex-col gap-3">
        <div class="flex gap-3 items-center w-full">
          <button id="createSessionBtn"
            class="p-3 bg-white/5 border border-white/10 rounded-xl text-primary hover:bg-primary/10 transition-all active:scale-95 group"
            title="Create Learning Session">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="group-hover:scale-110 transition-transform">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </button>
          <input id="messageInput" placeholder="Type a message or paste a meeting link…" class="flex-1" />
          <button id="sendMessageBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send
          </button>
        </div>
      </div>

    </div>

    <p class="text-gray-500 mt-4 text-xs text-center">
      💡 Use "Create Session" to share structured meeting links (Google Meet, Zoom etc.)
    </p>

    <!-- SESSION CREATION MODAL -->
    <div id="sessionModalOverlay"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
      <div
        class="bg-[#0f172a] border border-white/10 rounded-2xl w-full max-w-md p-6 shadow-2xl transform scale-95 transition-transform duration-300">
        <h3 class="text-xl font-bold text-white mb-4">Create Session</h3>

        <div class="space-y-4">
          <div>
            <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1 block">Meeting Link *</label>
            <input id="sessionLink" type="url" placeholder="https://meet.google.com/..."
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white outline-none focus:border-primary/50 transition" />
          </div>
          <div>
            <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1 block">Session Title
              (Optional)</label>
            <input id="sessionTitle" type="text" placeholder="e.g. React Basics Review"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white outline-none focus:border-primary/50 transition" />
          </div>
          <div>
            <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1 block">Scheduled Time
              (Optional)</label>
            <input id="sessionTime" type="datetime-local"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white outline-none focus:border-primary/50 transition color-scheme-dark" />
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button id="closeSessionModal"
            class="flex-1 py-3 border border-white/10 rounded-xl text-gray-400 hover:bg-white/5 transition">Cancel</button>
          <button id="submitSession"
            class="flex-1 py-3 bg-primary text-white rounded-xl font-bold hover:bg-primary/80 transition">Create &
            Share</button>
        </div>
      </div>
    </div>

  </main>

  <style>
    /* Session Card Styles */
    .session-card {
      background: rgba(0, 96, 100, 0.1);
      border: 1px solid rgba(0, 96, 100, 0.2);
      border-radius: 16px;
      padding: 16px;
      margin: 8px 0;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 16px -8px rgba(0, 96, 100, 0.4);
    }

    .session-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #00bcd4;
    }

    .session-card-title {
      font-weight: 700;
      font-size: 15px;
      color: white;
      line-height: 1.2;
    }

    .session-card-time {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .session-join-btn {
      background: #006064;
      color: white;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.2s;
    }

    .session-join-btn:hover {
      background: #00838f;
      transform: translateY(-1px);
    }

    .color-scheme-dark {
      color-scheme: dark;
    }
  </style>

  <script type="module" src="../backend/script.js"></script>
  <script>
    // Session Modal Toggle
    const modal = document.getElementById('sessionModalOverlay');
    const content = modal.querySelector('div');

    document.getElementById('createSessionBtn').onclick = () => {
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.replace('opacity-0', 'opacity-100');
        content.classList.replace('scale-95', 'scale-100');
      }, 10);
    };

    const closeModal = () => {
      modal.classList.replace('opacity-100', 'opacity-0');
      content.classList.replace('scale-100', 'scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    };

    document.getElementById('closeSessionModal').onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };
  </script>
</body>

</html>
