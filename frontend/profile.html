<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SkillSwap — Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006064',
            accent: '#FF7F50'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-[#0F172A] via-[#020617] to-[#020617] text-gray-200 min-h-screen overflow-x-hidden">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 backdrop-blur-lg bg-[#020617]/80 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div id="sidebarAvatarSmall"
          class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-accent flex items-center justify-center font-bold text-white text-lg">
          S
        </div>
        <span class="text-xl font-semibold">SkillSwap</span>
      </div>

      <div class="flex items-center space-x-4">
        <a href="home.html" class="text-sm">Dashboard</a>
        <a href="browse.html" class="text-sm">Browse</a>
        <a href="view-requests.html" class="text-sm">Requests</a>
        <a href="profile.html" class="text-sm font-semibold">Profile</a>
        <button onclick="logout()"
          class="px-4 py-2 rounded-lg border border-white/20 hover:bg-white/10 transition">Logout</button>
      </div>
    </div>
  </nav>

  <!-- PROFILE CONTENT -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <section id="profileCard" class="bg-white/5 backdrop-blur p-8 rounded-xl border border-white/10 mb-6">
      <div class="flex justify-between items-start gap-6">
        <div class="flex items-start gap-6 flex-1">
          <div id="profileAvatar" class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center font-bold text-white text-3xl flex-shrink-0 overflow-hidden">
            ?
          </div>
          <div class="flex-1">
            <h1 class="text-2xl font-semibold" id="profileName">User</h1>
            <div id="profileBioContainer" class="mt-2">
              <p id="profileBio" class="text-gray-400">No bio added yet.</p>
            </div>
            <p id="profileEmail" class="text-gray-400 mt-3">Email: —</p>
            <p id="profileRating" class="text-gray-400 mt-2">Rating: N/A</p>
          </div>
        </div>

        <div>
          <button id="editProfileBtn" class="bg-black text-white px-4 py-2 rounded-lg hover:bg-black/80 transition">Edit Profile</button>
        </div>
      </div>
    </section>

    <section class="grid md:grid-cols-2 gap-6">
      <div class="bg-white/5 backdrop-blur p-6 rounded-xl border border-white/10">
        <h3 class="font-semibold mb-3">Skills I Can Teach</h3>
        <div id="skillsTeach" class="flex flex-wrap gap-2">
          <!-- tags injected here -->
        </div>
      </div>

      <div class="bg-white/5 backdrop-blur p-6 rounded-xl border border-white/10">
        <h3 class="font-semibold mb-3">Skills I Want to Learn</h3>
        <div id="skillsLearn" class="flex flex-wrap gap-2">
          <!-- tags injected here -->
        </div>
      </div>
    </section>

    <!-- EDIT FORM (hidden by default) -->
    <section id="editForm" class="max-w-3xl mt-6 bg-white/5 backdrop-blur p-6 rounded-xl border border-white/10 hidden">
      <h3 class="font-semibold mb-3">Edit your profile</h3>

      <label class="block text-sm text-gray-300">Name</label>
      <input id="editName" class="w-full px-3 py-2 rounded-md bg-[#020617] border border-white/10 mt-1 text-gray-200" />

      <label class="block text-sm text-gray-300 mt-4">Bio</label>
      <textarea id="editBio" maxlength="300" rows="3"
        class="w-full px-3 py-2 rounded-md bg-[#020617] border border-white/10 mt-1 text-gray-200 resize-none" placeholder="Tell us about yourself..."></textarea>

      <label class="block text-sm text-gray-300 mt-4">Skills you can teach (comma-separated)</label>
      <input id="editOffer"
        class="w-full px-3 py-2 rounded-md bg-[#020617] border border-white/10 mt-1 text-gray-200" />

      <label class="block text-sm text-gray-300 mt-4">Skills you want to learn (comma-separated)</label>
      <input id="editLearn"
        class="w-full px-3 py-2 rounded-md bg-[#020617] border border-white/10 mt-1 text-gray-200" />

      <div class="flex items-center justify-between mt-6">
        <div class="flex gap-3">
          <button id="saveProfileBtn" class="px-4 py-2 bg-primary rounded-md text-white hover:bg-primary/80 transition">Save</button>
          <button id="cancelEditBtn" class="px-4 py-2 border border-white/20 rounded-md hover:bg-white/5 transition">Cancel</button>
        </div>
        <button id="deleteAccountBtn" class="px-3 py-1.5 text-xs font-semibold text-red-500 border border-red-500/50 rounded-md hover:bg-red-500 hover:text-white transition-all ml-auto">
          Delete Account
        </button>
      </div>

      <p id="editMsg" class="mt-3 text-sm"></p>
    </section>

  </main>

  <!-- DELETE ACCOUNT CONFIRMATION MODAL -->
  <div id="deleteModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[110] hidden opacity-0 transition-opacity duration-300">
    <div class="bg-[#0f172a] text-gray-200 rounded-xl w-full max-w-md mx-4 p-8 border border-white/10 shadow-2xl transform scale-95 transition-transform duration-300">
      <h3 class="text-xl font-bold text-white mb-4">Are you sure?</h3>
      <p class="text-gray-400 leading-relaxed mb-8">
        Are you sure you want to permanently delete your account? This action cannot be undone.
      </p>
      <div class="flex justify-end gap-4">
        <button id="cancelDeleteBtn" class="px-6 py-2.5 rounded-lg border border-white/10 hover:bg-white/5 transition font-medium">
          Cancel
        </button>
        <button id="confirmDeleteBtn" class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg transition font-medium shadow-lg shadow-red-900/20">
          Confirm Delete
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="../backend/script.js"></script>
  <script>
    // small helpers for UI interactions — the main logic in script.js will wire events
    document.addEventListener('click', (e) => {
      // prevent the edit button from doing anything default here — script.js will attach listeners
    });
  </script>
</body>

</html>
